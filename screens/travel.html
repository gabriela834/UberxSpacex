<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/utils.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <title>Travel | UberX SpaceX</title>
</head>

<body>
    <div class="container app-shell travel-page">
        <header class="travel-header">
            <a href="home.html" class="back-btn">←</a>
            <div>
                <p class="eyebrow">Active route</p>
                <h1>Earth to Mars</h1>
            </div>
            <span class="status-pill">On time</span>
        </header>

        <main class="travel-main">
            <section class="space-map">
                <img src="../assets/route-map.png" alt="Live route map" class="route-image">
                <div class="map-label map-label-start">Earth Dock 4</div>
                <div class="map-label map-label-end">Mars Gate A7</div>
                <div class="ship">🚀</div>
            </section>

            <!-- BOTTOM SHEET -->
            <input type="checkbox" id="sheet-toggle" class="sheet-toggle">

            <label for="sheet-toggle" class="sheet-header">
                <span>Next Launch • 18:40 • 42 min</span>
                <span class="chevron">↓</span>
            </label>

            <div class="bottom-sheet">
                <div class="sheet-content">
                    <!-- Opciones de naves con radio buttons -->
                    <label class="ship-option">
                        <input type="radio" name="ship" value="890" checked>
                        <img src="../assets/hero-orbit.png" alt="Crew Dragon">
                        <div>
                            <h3>Crew Dragon</h3>
                            <p class="text-secondary">Comfort Plus • Express</p>
                        </div>
                        <strong class="price-tag">$890</strong>
                    </label>

                    <label class="ship-option">
                        <input type="radio" name="ship" value="1240">
                        <img src="../assets/destination-mars.png" alt="Starliner">
                        <div>
                            <h3>Starliner</h3>
                            <p class="text-secondary">Business Orbit</p>
                        </div>
                        <strong class="price-tag">$1,240</strong>
                    </label>

                    <label class="ship-option">
                        <input type="radio" name="ship" value="680">
                        <img src="../assets/destination-moon.png" alt="Dream Chaser">
                        <div>
                            <h3>Dream Chaser</h3>
                            <p class="text-secondary">Solo Pod</p>
                        </div>
                        <strong class="price-tag">$680</strong>
                    </label>
                </div>

                <!-- Swipe to Confirm -->
                <div class="swipe-container">
                    <input type="range" id="swipe" min="0" max="100" value="0">
                    <a href="booking.html" class="swipe-label">Swipe to Confirm Booking</a>
                </div>
            </div>
        </main>

        <footer class="bottom-nav">
            <nav>
                <a href="home.html" class="nav-item">
                    <strong>⌂</strong>
                    <span>Home</span>
                </a>
                <a href="travel.html" class="nav-item active">
                    <strong>↗</strong>
                    <span>Travel</span>
                </a>
                <a href="booking.html" class="nav-item">
                    <strong>□</strong>
                    <span>Book</span>
                </a>
                <a href="payment-methods.html" class="nav-item">
                    <strong>◈</strong>
                    <span>Pay</span>
                </a>
            </nav>
        </footer>
    </div>
</body>

</html>
