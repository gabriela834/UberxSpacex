<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/utils.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <title>Home | UberX SpaceX</title>
</head>

<body>

    <div class="container">

        <header class="home-header">

            <div class="user-info">

                <div class="avatar"></div>

                <div>
                    <p class="text-secondary">Good Morning 👋</p>
                    <h2>Gabriela</h2>
                </div>

            </div>

            <div class="notification">
                🔔
            </div>

        </header>

        <main class="home-content">

            <section class="security-banner card">

                <div class="banner-text">
            
                    <h3>Travel Safely</h3>
            
                    <p class="text-secondary">
                        Your intergalactic trip is protected.
                    </p>
            
                </div>
            
                <div class="banner-image">
                    🚀
                </div>

                </section>

                <section class="quick-actions">

                    <a href="travel.html" class="action-card">
                        <span class="action-icon">🚀</span>
                        <p>Travel</p>
                    </a>
                
                    <a href="#" class="action-card">
                        <span class="action-icon">🌍</span>
                        <p>Explore</p>
                    </a>
                
                    <a href="booking.html" class="action-card">
                        <span class="action-icon">📅</span>
                        <p>Book</p>
                    </a>
                
                </section>

                <section class="search-box">

                    <input
                        type="search"
                        placeholder="Where to...?"
                    >
                
                    <span>🕒</span>
                
                </section>
                <section class="destinations">

                    <h3>Popular Destinations</h3>
                
                    <div class="destination-card">
                        <div class="planet">🌍</div>
                
                        <div>
                            <h4>Earth</h4>
                            <p class="text-secondary">Our home planet</p>
                        </div>
                    </div>
                
                    <div class="destination-card">
                        <div class="planet">🔴</div>
                
                        <div>
                            <h4>Mars</h4>
                            <p class="text-secondary">The red planet</p>
                        </div>
                    </div>
                
                    <div class="destination-card">
                        <div class="planet">🌕</div>
                
                        <div>
                            <h4>Moon</h4>
                            <p class="text-secondary">Earth's satellite</p>
                        </div>
                    </div>
                
                    <div class="destination-card">
                        <div class="planet">🛰️</div>
                
                        <div>
                            <h4>International Space Station</h4>
                            <p class="text-secondary">Low Earth Orbit</p>
                        </div>
                    </div>
                
                </section>


            </section>

        </main>

        <footer class="bottom-nav">
            <nav>

                <a href="home.html" class="nav-item active">
                    🏠
                    <span>Home</span>
                </a>
            
                <a href="travel.html" class="nav-item">
                    🚀
                    <span>Journeys</span>
                </a>
            
            </nav>
        </footer>

    </div>

</body>

</html>
